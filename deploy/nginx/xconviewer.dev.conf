server {
  listen 80;
  listen [::]:80;
  server_name xconviewer.dev www.xconviewer.dev;

  location /.well-known/acme-challenge/ {
    root /var/www/letsencrypt;
  }

  location / {
    return 301 https://xconviewer.dev$request_uri;
  }
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name xconviewer.dev www.xconviewer.dev;

  root /var/www/xconviewer.dev/current;
  index index.html;

  ssl_certificate /etc/letsencrypt/live/xconviewer.dev/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/xconviewer.dev/privkey.pem;
  ssl_session_timeout 1d;
  ssl_session_cache shared:XCONVIEWERSSL:10m;
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_prefer_server_ciphers off;

  add_header X-Content-Type-Options nosniff always;
  add_header Referrer-Policy strict-origin-when-cross-origin always;
  add_header X-Frame-Options SAMEORIGIN always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

  gzip on;
  gzip_vary on;
  gzip_min_length 1024;
  gzip_types
    text/plain
    text/css
    text/markdown
    text/javascript
    application/javascript
    application/json
    application/xml
    image/svg+xml;

  if ($host = www.xconviewer.dev) {
    return 301 https://xconviewer.dev$request_uri;
  }

  location ~ /\.(?!well-known) {
    deny all;
  }

  location = /xcon.schema.json {
    default_type application/json;
    add_header Cache-Control "public, max-age=300" always;
    try_files /xcon.schema.json =404;
  }

  location = /llms.txt {
    default_type text/plain;
    add_header Cache-Control "public, max-age=300" always;
    try_files /llms.txt =404;
  }

  location = /llms-full.txt {
    default_type text/plain;
    add_header Cache-Control "public, max-age=300" always;
    try_files /llms-full.txt =404;
  }

  location ~ \.md$ {
    default_type text/markdown;
    if ($arg_raw != "1") {
      rewrite ^ /markdown-viewer.html last;
    }
    add_header Cache-Control "public, max-age=300" always;
    try_files $uri =404;
  }

  location ~* \.(?:css|js|mjs|json|xml|txt|svg|xcon|xconj|xcons|xcont|xconx|sketch)$ {
    types {
      text/css css;
      text/javascript js mjs;
      application/json json xconj;
      application/xml xml xconx;
      image/svg+xml svg;
      text/plain txt xcon xcons xcont sketch;
    }
    add_header Cache-Control "public, max-age=300" always;
    try_files $uri =404;
  }

  location / {
    add_header Cache-Control "public, max-age=120" always;
    try_files $uri $uri.html $uri/index.html =404;
  }
}
