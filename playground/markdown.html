<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>XCON Markdown Playground</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --panel-2: #eef2f6;
      --ink: #172033;
      --muted: #667085;
      --line: #d9e0ea;
      --accent: #c4622d;
      --accent-rgb: 196, 98, 45;
      --danger: #b42318;
      --ok: #027a48;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    html[data-theme="dark"] {
      color-scheme: dark;
      --bg: #0c0c0f;
      --panel: #16161a;
      --panel-2: #1e1e24;
      --ink: #f0eef8;
      --muted: #8b88a0;
      --line: rgba(255, 255, 255, 0.1);
      --accent: #7c6af7;
      --accent-rgb: 124, 106, 247;
      --danger: #f87171;
      --ok: #34d399;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
    }

    .shell {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .shell > header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }

    h1 {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .header-actions,
    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    button,
    .button-link,
    .select {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 32px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel);
      color: var(--ink);
      padding: 6px 10px;
      font: inherit;
      text-decoration: none;
    }

    button {
      cursor: pointer;
    }

    button:hover,
    .button-link:hover { border-color: #b8c2d1; }

    button.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #ffffff;
    }

    button[aria-pressed="true"] {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(var(--accent-rgb), 0.08);
    }

    .shell > main {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(280px, var(--editor-pane-size, 50%)) 8px minmax(320px, 1fr);
    }

    .pane {
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: auto 1fr auto;
      border-right: 1px solid var(--line);
      background: var(--panel);
    }

    .pane:last-child { border-right: 0; }

    .pane-splitter {
      min-width: 0;
      min-height: 0;
      border: 0;
      border-left: 1px solid var(--line);
      border-right: 1px solid var(--line);
      background: var(--panel-2);
      padding: 0;
      cursor: col-resize;
      position: relative;
    }

    .pane-splitter::before {
      content: "";
      position: absolute;
      top: 50%;
      left: 50%;
      width: 2px;
      height: 44px;
      border-radius: 999px;
      background: var(--muted);
      opacity: 0.34;
      transform: translate(-50%, -50%);
    }

    .pane-splitter:hover::before,
    .pane-splitter:focus-visible::before {
      background: var(--accent);
      opacity: 1;
    }

    .pane-splitter:focus-visible {
      outline: 2px solid rgba(var(--accent-rgb), 0.42);
      outline-offset: -2px;
    }

    html.is-pane-resizing,
    html.is-pane-resizing * {
      cursor: col-resize !important;
      user-select: none !important;
    }

    .pane-head {
      min-width: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }

    .pane-title {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      font-weight: 700;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      border-radius: 999px;
      padding: 3px 8px;
      background: rgba(var(--accent-rgb), 0.1);
      color: var(--accent);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.02em;
      text-transform: uppercase;
    }

    .editor {
      width: 100%;
      min-height: 0;
      border: 0;
      resize: none;
      outline: none;
      padding: 16px;
      font: 13px/1.55 "JetBrains Mono", "SFMono-Regular", Consolas, monospace;
      color: #111827;
      background: #fbfcfe;
      tab-size: 2;
    }

    html[data-theme="dark"] .editor {
      color: #f8fafc;
      background: #101217;
    }

    .preview-wrap {
      min-height: 0;
      overflow: auto;
      background: var(--bg);
    }

    .markdown-preview {
      --bg: #f7f4ef;
      --bg2: #efebe3;
      --surface: #fdfcfa;
      --surface2: #f2ede5;
      --border: rgba(60, 45, 25, 0.1);
      --border2: rgba(60, 45, 25, 0.18);
      --ink: #1c1710;
      --ink-2: #6b5f4e;
      --ink-3: #a8998a;
      --accent: #c4622d;
      --accent-2: #9a4a1f;
      --accent-lt: #f0d5c4;
      --accent-dk: #9a4a1f;
      --accent-hover: #9a4a1f;
      --accent-rgb: 196, 98, 45;
      --accent-gradient-end: #e88b5a;
      --green: #2d7d4f;
      --green-lt: #d1ead9;
      --red: #c03a2b;
      --red-lt: #fad7d3;
      --blue: #2b5fa0;
      --blue-lt: #d1dff5;
      --yellow: #b07d12;
      --yellow-lt: #faf0c0;
      --font-body: "Plus Jakarta Sans", Inter, system-ui, sans-serif;
      min-height: 100%;
      padding: 28px;
      color: var(--ink);
      background: var(--surface);
      font: 15px/1.65 var(--font-body);
    }

    html[data-theme="dark"] .markdown-preview {
      --bg: #0c0c0f;
      --bg2: #121218;
      --surface: #16161a;
      --surface2: #1e1e24;
      --border: rgba(255, 255, 255, 0.055);
      --border2: rgba(255, 255, 255, 0.1);
      --ink: #f0eef8;
      --ink-2: #8b88a0;
      --ink-3: #5a5770;
      --accent: #7c6af7;
      --accent-rgb: 124, 106, 247;
      --green: #34d399;
      --green-lt: rgba(52, 211, 153, 0.12);
      --red: #f87171;
      --red-lt: rgba(248, 113, 113, 0.12);
      --blue: #60a5fa;
      --blue-lt: rgba(96, 165, 250, 0.12);
      --yellow: #fbbf24;
      --yellow-lt: rgba(251, 191, 36, 0.12);
      --font-body: Outfit, Inter, system-ui, sans-serif;
    }

    .markdown-preview > :first-child { margin-top: 0; }
    .markdown-preview h1,
    .markdown-preview h2,
    .markdown-preview h3 {
      margin: 28px 0 10px;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .markdown-preview h1 {
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border2);
      font-size: 28px;
    }

    .markdown-preview h2 { font-size: 22px; }
    .markdown-preview h3 { font-size: 18px; }
    .markdown-preview p { margin: 0 0 14px; }
    .markdown-preview ul,
    .markdown-preview ol { margin: 0 0 16px 22px; padding: 0; }
    .markdown-preview li { margin: 5px 0; }
    .markdown-preview a { color: var(--accent); text-decoration: none; }
    .markdown-preview a:hover { text-decoration: underline; }

    .markdown-table-wrap {
      margin: 14px 0 18px;
      overflow: auto;
      border: 1px solid var(--border2);
      border-radius: 8px;
    }

    .markdown-preview table {
      width: 100%;
      min-width: 520px;
      border-collapse: collapse;
      background: transparent;
      font-size: 14px;
      line-height: 1.55;
    }

    .markdown-preview th,
    .markdown-preview td {
      padding: 10px 12px;
      border-right: 1px solid var(--border2);
      border-bottom: 1px solid var(--border2);
      text-align: left;
      vertical-align: top;
    }

    .markdown-preview th {
      background: color-mix(in srgb, var(--surface2) 72%, transparent);
      color: var(--ink);
      font-weight: 700;
    }

    .markdown-preview tr:last-child td { border-bottom: 0; }
    .markdown-preview th:last-child,
    .markdown-preview td:last-child { border-right: 0; }

    .markdown-preview code:not(pre code) {
      border: 1px solid var(--border);
      border-radius: 5px;
      background: var(--surface2);
      padding: 1px 5px;
      font: 0.9em/1.4 "JetBrains Mono", "SFMono-Regular", Consolas, monospace;
    }

    .markdown-preview pre {
      overflow: auto;
      border: 1px solid var(--border2);
      border-radius: 8px;
      background: var(--bg2);
      padding: 14px;
      font: 13px/1.55 "JetBrains Mono", "SFMono-Regular", Consolas, monospace;
    }

    .markdown-math-inline {
      display: inline-flex;
      align-items: baseline;
      gap: 0.12em;
      padding: 1px 5px;
      border-radius: 6px;
      background: color-mix(in srgb, var(--surface2) 72%, transparent);
      color: var(--ink);
      font-family: "Cambria Math", "STIX Two Math", "Times New Roman", serif;
      font-size: 1.04em;
      line-height: 1.25;
      white-space: nowrap;
    }

    .markdown-math-block {
      display: block;
      overflow-x: auto;
      margin: 16px 0 20px;
      padding: 18px 20px;
      border: 1px solid var(--border2);
      border-radius: 10px;
      background: color-mix(in srgb, var(--surface2) 42%, transparent);
      color: var(--ink);
      font-family: "Cambria Math", "STIX Two Math", "Times New Roman", serif;
      font-size: 1.24em;
      line-height: 1.45;
      text-align: center;
    }

    .markdown-frac {
      display: inline-grid;
      grid-template-rows: auto auto;
      align-items: center;
      justify-items: center;
      min-width: 1.8em;
      margin: 0 0.12em;
      vertical-align: middle;
    }

    .markdown-frac-num {
      width: 100%;
      padding: 0 0.18em 0.08em;
      border-bottom: 1px solid currentColor;
      font-size: 0.82em;
      line-height: 1.12;
    }

    .markdown-frac-den {
      padding: 0.08em 0.18em 0;
      font-size: 0.82em;
      line-height: 1.12;
    }

    .markdown-xcon-block {
      margin: 18px 0 24px;
      overflow: visible;
      border: 1px solid var(--border2);
      border-radius: 10px;
      background: var(--surface);
      padding: 12px;
      box-shadow: 0 10px 28px rgba(28, 23, 16, 0.08);
    }

    .markdown-xcon-frame {
      position: relative;
      box-sizing: border-box;
      max-width: 100%;
      min-height: 80px;
      overflow: visible;
      isolation: isolate;
    }

    .markdown-xcon-error,
    .xcon-markdown-error {
      margin: 18px 0 24px;
      overflow: auto;
      border: 1px solid rgba(180, 35, 24, 0.24);
      border-radius: 8px;
      background: rgba(180, 35, 24, 0.08);
      color: var(--danger);
      padding: 12px;
      white-space: pre-wrap;
      font: 13px/1.45 "JetBrains Mono", "SFMono-Regular", Consolas, monospace;
    }

    .status {
      min-height: 42px;
      padding: 9px 12px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
      white-space: pre-wrap;
      overflow: auto;
      background: var(--panel);
    }

    .status.error { color: var(--danger); }
    .status.ok { color: var(--ok); }

    @media (max-width: 900px) {
      .shell > main {
        grid-template-columns: 1fr;
        grid-template-rows: minmax(420px, 1fr) minmax(420px, 1fr);
      }

      .pane {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      .pane-splitter { display: none; }

      .shell > header {
        align-items: flex-start;
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <h1>XCON Markdown Playground</h1>
      <div class="header-actions">
        <button type="button" id="themeToggle" aria-pressed="false">Dark</button>
        <a class="button-link" href="/play">XCON Playground</a>
        <button type="button" id="copyMarkdown">Copy Markdown</button>
      </div>
    </header>
    <main>
      <section class="pane">
        <div class="pane-head">
          <div class="pane-title">
            <span class="badge">Markdown</span>
            <span>Source</span>
          </div>
          <div class="toolbar">
            <button type="button" id="loadSample">Sample</button>
            <button type="button" id="renderMarkdown" class="primary">Render</button>
          </div>
        </div>
        <textarea id="markdownSource" class="editor" spellcheck="false"></textarea>
        <div id="markdownStatus" class="status">Ready.</div>
      </section>
      <div class="pane-splitter" id="paneSplitter" role="separator" aria-orientation="vertical" aria-label="Resize source and preview panes" aria-valuemin="280" aria-valuemax="1200" aria-valuenow="0" tabindex="0"></div>
      <section class="pane">
        <div class="pane-head">
          <div class="pane-title">
            <span class="badge">Preview</span>
            <span>Markdown + XCON</span>
          </div>
        </div>
        <div class="preview-wrap">
          <div id="markdownPreview" class="markdown-preview"></div>
        </div>
        <div id="markdownValidation" class="status">XCON fence output appears here.</div>
      </section>
    </main>
  </div>

  <script type="importmap">
    {
      "imports": {
        "@xcon-viewer/core": "../packages/core/dist/index.js",
        "@xcon-viewer/markdown-it": "../packages/markdown-it/dist/index.js",
        "@xcon-viewer/viewer": "../packages/viewer/dist/index.js"
      }
    }
  </script>
  <script src="../vendor/markdown-it/markdown-it.min.js"></script>

  <script type="module">
    import xconMarkdownIt from '@xcon-viewer/markdown-it';
    import { hydrateXconViewer, viewerCss } from '@xcon-viewer/viewer';

    const previewRenderOptions = { allowExternalResources: true, allowHtml: true };
    const viewerStyle = document.createElement('style');
    viewerStyle.id = 'xcon-viewer-style';
    viewerStyle.textContent = viewerCss;
    document.head.appendChild(viewerStyle);

    const MarkdownIt = globalThis.markdownit;
    if (typeof MarkdownIt !== 'function') {
      throw new Error('markdown-it browser bundle failed to load.');
    }

    const markdown = MarkdownIt({
      html: false,
      linkify: true,
      typographer: false,
    });
    markdown.use(xconMarkdownIt, {
      renderOptions: previewRenderOptions,
      containerClass: 'markdown-xcon-block',
      frameClass: 'markdown-xcon-frame',
    });

    const sampleMarkdown = `# Markdown + XCON

This page renders normal Markdown and any fenced XCON block in the same preview.

## Auto-detected SKETCH in \`xcon\`

\`\`\`xcon
screen 360x180 bg @surface
  title: label "Sketch in Markdown" at 20 22 320 32
    color @ink
    font
      size 22
      weight 800
  body: label "The xcon fence auto-detects SKETCH from the screen header." at 20 66 312 44
    color @ink-2
    font
      size 13
  cta: button "Render Preview" at 20 124 180 42
    backgroundColor @accent
    color #ffffff
    border
      visible false
      radius 8
\`\`\`

## JSON fence for canonical structure

\`\`\`xcon-json
{
  "type": "form",
  "pos": [0, 0, 360, 160],
  "backgroundColor": "@surface",
  "components": {
    "title": {
      "type": "label",
      "pos": [20, 20, 320, 30],
      "text": "JSON also works",
      "font": { "size": 22, "weight": 800 },
      "color": "@ink"
    },
    "button": {
      "type": "button",
      "pos": [20, 86, 160, 42],
      "label": "xconj alias",
      "backgroundColor": "@accent",
      "color": "#fff",
      "border": { "visible": false, "radius": 8 }
    }
  }
}
\`\`\`

- Supported fences: \`xcon-sketch\`, \`xcons\`, \`xcon\`, \`xcon-json\`, \`xconj\`, \`xcon-xml\`, \`xconx\`, \`xcon-tagless\`, \`xconl\`, \`xcont\`.

## Math

Inline math: $E = mc^2$.

Block equations:

$$ \\sum_{i=1}^{n} i = \\frac{n(n+1)}{2} $$
`;

    const source = document.getElementById('markdownSource');
    const preview = document.getElementById('markdownPreview');
    const status = document.getElementById('markdownStatus');
    const validation = document.getElementById('markdownValidation');
    const themeToggle = document.getElementById('themeToggle');
    const renderButton = document.getElementById('renderMarkdown');
    const sampleButton = document.getElementById('loadSample');
    const copyButton = document.getElementById('copyMarkdown');
    const paneSplitter = document.getElementById('paneSplitter');
    let renderTimer = 0;

    source.value = readSharedMarkdown() ?? sampleMarkdown;
    initPaneSplitter();
    renderMarkdownSource();

    source.addEventListener('input', scheduleMarkdownRender);
    renderButton.addEventListener('click', renderMarkdownSource);
    sampleButton.addEventListener('click', () => {
      source.value = sampleMarkdown;
      renderMarkdownSource();
    });
    copyButton.addEventListener('click', async () => {
      await navigator.clipboard.writeText(source.value);
      writeStatus('Markdown copied.', 'ok');
    });
    themeToggle.addEventListener('click', () => {
      const next = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', next);
      themeToggle.textContent = next === 'dark' ? 'Light' : 'Dark';
      themeToggle.setAttribute('aria-pressed', String(next === 'dark'));
    });

    function initPaneSplitter() {
      const main = paneSplitter?.parentElement;
      if (!paneSplitter || !main) return;
      const minLeft = 280;
      const minRight = 320;

      paneSplitter.addEventListener('pointerdown', startPaneResize);
      paneSplitter.addEventListener('keydown', (event) => {
        if (event.key !== 'ArrowLeft' && event.key !== 'ArrowRight' && event.key !== 'Home' && event.key !== 'End') return;
        event.preventDefault();
        if (event.key === 'Home') {
          setPaneSize(minLeft);
          return;
        }
        if (event.key === 'End') {
          const rect = main.getBoundingClientRect();
          setPaneSize(rect.width - splitterWidth() - minRight);
          return;
        }
        nudgePaneSize(event.key === 'ArrowLeft' ? -24 : 24);
      });

      function startPaneResize(event) {
        if (window.matchMedia('(max-width: 900px)').matches) return;
        event.preventDefault();
        paneSplitter.setPointerCapture?.(event.pointerId);
        document.documentElement.classList.add('is-pane-resizing');
        window.addEventListener('pointermove', resizePane);
        window.addEventListener('pointerup', stopPaneResize, { once: true });
        resizePane(event);
      }

      function resizePane(event) {
        const rect = main.getBoundingClientRect();
        setPaneSize(event.clientX - rect.left);
      }

      function stopPaneResize(event) {
        window.removeEventListener('pointermove', resizePane);
        paneSplitter.releasePointerCapture?.(event.pointerId);
        document.documentElement.classList.remove('is-pane-resizing');
      }

      function nudgePaneSize(delta) {
        const current = readPaneSize();
        setPaneSize(current + delta);
      }

      function readPaneSize() {
        const value = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--editor-pane-size'));
        if (Number.isFinite(value)) return value;
        return Math.round(main.getBoundingClientRect().width / 2);
      }

      function setPaneSize(value) {
        const rect = main.getBoundingClientRect();
        const maxLeft = Math.max(minLeft, rect.width - splitterWidth() - minRight);
        const next = Math.round(Math.max(minLeft, Math.min(maxLeft, value)));
        document.documentElement.style.setProperty('--editor-pane-size', `${next}px`);
        paneSplitter.setAttribute('aria-valuenow', String(next));
      }

      function splitterWidth() {
        return paneSplitter.getBoundingClientRect().width || 8;
      }
    }

    function scheduleMarkdownRender() {
      clearTimeout(renderTimer);
      renderTimer = setTimeout(renderMarkdownSource, 250);
    }

    function renderMarkdownSource() {
      try {
        preview.innerHTML = renderMarkdownWithMath(markdown, source.value);
        hydrateXconViewer(preview);
        const errorCount = preview.querySelectorAll('[data-xcon-error]').length;
        const renderedCount = preview.querySelectorAll('[data-xcon-markdown]').length;
        validation.className = `status ${errorCount ? 'error' : 'ok'}`;
        validation.textContent = errorCount
          ? `${errorCount} XCON fence error(s).`
          : renderedCount
            ? `OK: ${renderedCount} XCON fence(s) rendered.`
            : 'No XCON fences found.';
        writeStatus('Rendered Markdown preview.', 'ok');
      } catch (error) {
        writeStatus(error.message, 'error');
      }
    }

    function renderMarkdownWithMath(markdownRenderer, markdownSource) {
      const prepared = prepareMarkdownMath(String(markdownSource || ''));
      return restoreMarkdownMath(markdownRenderer.render(prepared.source), prepared.tokens);
    }

    function prepareMarkdownMath(markdownSource) {
      const tokens = [];
      const output = [];
      const lines = String(markdownSource || '').split('\n');
      let inFence = false;
      let fenceMarker = '';

      for (let lineIndex = 0; lineIndex < lines.length; lineIndex += 1) {
        const line = lines[lineIndex];
        const fenceMatch = line.match(/^\s*(```|~~~)/);
        if (fenceMatch) {
          if (!inFence) {
            inFence = true;
            fenceMarker = fenceMatch[1];
          } else if (fenceMatch[1] === fenceMarker) {
            inFence = false;
            fenceMarker = '';
          }
          output.push(line);
          continue;
        }

        if (inFence) {
          output.push(line);
          continue;
        }

        const trimmed = line.trim();
        if (trimmed.startsWith('$$')) {
          const collected = [];
          let rest = trimmed.slice(2);
          let closed = false;
          const sameLineEnd = rest.lastIndexOf('$$');
          if (sameLineEnd >= 0) {
            collected.push(rest.slice(0, sameLineEnd));
            closed = true;
          } else {
            if (rest) collected.push(rest);
            while (lineIndex + 1 < lines.length) {
              lineIndex += 1;
              const nextLine = lines[lineIndex];
              const endIndex = nextLine.indexOf('$$');
              if (endIndex >= 0) {
                collected.push(nextLine.slice(0, endIndex));
                closed = true;
                break;
              }
              collected.push(nextLine);
            }
          }
          if (closed) {
            output.push('', createMathToken(tokens, collected.join('\n'), true), '');
          } else {
            output.push(line);
          }
          continue;
        }

        output.push(replaceInlineMath(line, tokens));
      }

      return { source: output.join('\n'), tokens };
    }

    function replaceInlineMath(line, tokens) {
      let output = '';
      let index = 0;
      while (index < line.length) {
        const start = line.indexOf('$', index);
        if (start < 0) {
          output += line.slice(index);
          break;
        }
        if (line[start - 1] === '\\' || line[start + 1] === '$') {
          output += line.slice(index, start + 1);
          index = start + 1;
          continue;
        }
        let end = start + 1;
        while (end < line.length) {
          const char = line[end];
          if (char === '$' && line[end - 1] !== '\\') break;
          end += 1;
        }
        if (end >= line.length) {
          output += line.slice(index);
          break;
        }
        const expression = line.slice(start + 1, end).trim();
        if (!expression) {
          output += line.slice(index, end + 1);
        } else {
          output += line.slice(index, start);
          output += createMathToken(tokens, expression, false);
        }
        index = end + 1;
      }
      return output;
    }

    function createMathToken(tokens, expression, display) {
      const marker = `@@XCON_MATH_${tokens.length}@@`;
      tokens.push({
        marker,
        display,
        html: renderMathExpression(expression, display)
      });
      return marker;
    }

    function restoreMarkdownMath(html, tokens) {
      let output = String(html || '');
      for (const token of tokens) {
        const marker = escapeRegExp(token.marker);
        if (token.display) {
          output = output.replace(new RegExp(`<p>\\s*${marker}\\s*</p>`, 'g'), token.html);
        }
        output = output.replace(new RegExp(marker, 'g'), token.html);
      }
      return output;
    }

    function renderMathExpression(expression, display) {
      const body = renderTexLite(expression);
      const tag = display ? 'div' : 'span';
      const className = display ? 'markdown-math-block' : 'markdown-math-inline';
      return `<${tag} class="${className}" role="img" aria-label="${escapeHtml(expression)}">${body}</${tag}>`;
    }

    function renderTexLite(expression) {
      let html = escapeHtml(String(expression || '').trim())
        .replace(/\\left\s*/g, '')
        .replace(/\\right\s*/g, '');

      for (let pass = 0; pass < 6; pass += 1) {
        html = html.replace(/\\frac\s*\{([^{}]+)\}\s*\{([^{}]+)\}/g, (_match, numerator, denominator) => (
          `<span class="markdown-frac"><span class="markdown-frac-num">${renderTexLite(numerator)}</span><span class="markdown-frac-den">${renderTexLite(denominator)}</span></span>`
        ));
        html = html.replace(/\\sqrt\s*\{([^{}]+)\}/g, (_match, value) => `√<span class="markdown-radicand">${renderTexLite(value)}</span>`);
      }

      html = html
        .replace(/\\(sum|prod|int)\s*_\{([^{}]+)\}\s*\^\{([^{}]+)\}/g, (_match, name, sub, sup) => `${mathSymbol(name)}<sub>${renderTexLite(sub)}</sub><sup>${renderTexLite(sup)}</sup>`)
        .replace(/\^\{([^{}]+)\}/g, (_match, value) => `<sup>${renderTexLite(value)}</sup>`)
        .replace(/_\{([^{}]+)\}/g, (_match, value) => `<sub>${renderTexLite(value)}</sub>`)
        .replace(/\^([A-Za-z0-9+\-=]+)/g, (_match, value) => `<sup>${escapeHtml(value)}</sup>`)
        .replace(/_([A-Za-z0-9+\-=]+)/g, (_match, value) => `<sub>${escapeHtml(value)}</sub>`)
        .replace(/\\([A-Za-z]+)\b/g, (_match, name) => mathSymbol(name) || `\\${name}`)
        .replace(/\\,/g, '&thinsp;')
        .replace(/\\;/g, '&emsp;');

      return html;
    }

    function mathSymbol(name) {
      const symbols = {
        alpha: 'α', beta: 'β', gamma: 'γ', delta: 'δ', epsilon: 'ε',
        theta: 'θ', lambda: 'λ', mu: 'μ', pi: 'π', sigma: 'σ',
        phi: 'φ', omega: 'ω', Gamma: 'Γ', Delta: 'Δ', Theta: 'Θ',
        Lambda: 'Λ', Pi: 'Π', Sigma: 'Σ', Phi: 'Φ', Omega: 'Ω',
        sum: '∑', prod: '∏', int: '∫', infty: '∞', approx: '≈',
        neq: '≠', le: '≤', ge: '≥', times: '×', cdot: '·',
        pm: '±', to: '→', rightarrow: '→', leftarrow: '←'
      };
      return symbols[name] || '';
    }

    function escapeRegExp(value) {
      return String(value).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }

    function writeStatus(message, tone = '') {
      status.className = `status ${tone}`;
      status.textContent = message;
    }

    function readSharedMarkdown() {
      const params = new URLSearchParams(location.hash.slice(1));
      return params.get('markdown');
    }
  </script>
</body>
</html>
