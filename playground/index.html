<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>XCON Playground</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --panel: #ffffff;
      --panel-2: #eef2f6;
      --ink: #172033;
      --muted: #667085;
      --line: #d9e0ea;
      --accent: #2563eb;
      --accent-rgb: 37, 99, 235;
      --danger: #b42318;
      --ok: #027a48;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    html[data-theme="dark"] {
      color-scheme: dark;
      --bg: #0c0c0f;
      --panel: #16161a;
      --panel-2: #1e1e24;
      --ink: #f0eef8;
      --muted: #8b88a0;
      --line: rgba(255, 255, 255, 0.1);
      --accent: #7c6af7;
      --accent-rgb: 124, 106, 247;
      --danger: #f87171;
      --ok: #34d399;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
    }

    .shell {
      min-height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .shell > header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }

    .shell > header h1 {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .header-actions,
    .toolbar,
    .tabs {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .header-actions button,
    .toolbar button,
    .tabs button {
      min-height: 32px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel);
      color: var(--ink);
      padding: 6px 10px;
      font: inherit;
      cursor: pointer;
    }

    .header-actions button:hover,
    .toolbar button:hover,
    .tabs button:hover { border-color: #b8c2d1; }

    .header-actions button.primary,
    .toolbar button.primary,
    .tabs button.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #ffffff;
    }

    .header-actions button[aria-pressed="true"],
    .toolbar button[aria-pressed="true"],
    .tabs button[aria-pressed="true"] {
      border-color: var(--accent);
      color: var(--accent);
      background: #eff6ff;
    }

    .shell > main {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(280px, var(--editor-pane-size, 50%)) 8px minmax(320px, 1fr);
    }

    .pane {
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: auto 1fr auto;
      border-right: 1px solid var(--line);
      background: var(--panel);
    }

    .pane:last-child { border-right: 0; }

    .pane-splitter {
      min-width: 0;
      min-height: 0;
      border: 0;
      border-left: 1px solid var(--line);
      border-right: 1px solid var(--line);
      background: var(--panel-2);
      padding: 0;
      cursor: col-resize;
      position: relative;
    }

    .pane-splitter::before {
      content: "";
      position: absolute;
      top: 50%;
      left: 50%;
      width: 2px;
      height: 44px;
      border-radius: 999px;
      background: var(--muted);
      opacity: 0.34;
      transform: translate(-50%, -50%);
    }

    .pane-splitter:hover::before,
    .pane-splitter:focus-visible::before {
      background: var(--accent);
      opacity: 1;
    }

    .pane-splitter:focus-visible {
      outline: 2px solid rgba(var(--accent-rgb), 0.42);
      outline-offset: -2px;
    }

    html.is-pane-resizing,
    html.is-pane-resizing * {
      cursor: col-resize !important;
      user-select: none !important;
    }

    .pane-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }

    .preview-title {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .theme-panel {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: wrap;
      min-width: 0;
    }

    .theme-panel__label {
      font-size: 9px;
      line-height: 1;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .theme-switch {
      display: inline-flex;
      gap: 4px;
      padding: 4px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel-2);
    }

    .theme-switch__btn,
    .theme-accent-reset,
    .theme-preset-dot {
      font: inherit;
      cursor: pointer;
    }

    .theme-switch__btn {
      min-height: 28px;
      min-width: 54px;
      border: 0;
      border-radius: 4px;
      background: transparent;
      color: var(--muted);
      padding: 5px 10px;
      font-size: 12px;
      font-weight: 600;
    }

    .theme-switch__btn[aria-pressed="true"] {
      background: var(--panel);
      color: var(--accent);
      box-shadow: 0 1px 4px rgba(16, 24, 40, 0.08);
    }

    .theme-accent-row {
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .theme-accent-swatch {
      width: 32px;
      height: 30px;
      padding: 0;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel-2);
      cursor: pointer;
    }

    .theme-accent-swatch::-webkit-color-swatch-wrapper { padding: 3px; }
    .theme-accent-swatch::-webkit-color-swatch { border: 0; border-radius: 4px; }

    .theme-accent-hex {
      width: 88px;
      min-height: 30px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel);
      color: var(--ink);
      padding: 5px 8px;
      font: 12px/1.2 "JetBrains Mono", "SFMono-Regular", Consolas, monospace;
      outline: none;
    }

    .theme-accent-hex:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(var(--accent-rgb), 0.14);
    }

    .theme-accent-reset {
      min-height: 30px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--panel);
      color: var(--muted);
      padding: 5px 8px;
      font-size: 12px;
      font-weight: 600;
    }

    .theme-presets {
      display: inline-flex;
      align-items: center;
      gap: 5px;
    }

    .theme-preset-dot {
      width: 20px;
      height: 20px;
      border: 2px solid var(--panel);
      border-radius: 50%;
      box-shadow: 0 0 0 1px var(--line);
      padding: 0;
      flex: 0 0 auto;
    }

    .theme-preset-dot:hover {
      box-shadow: 0 0 0 2px var(--accent);
    }

    .editor {
      width: 100%;
      min-height: 0;
      border: 0;
      resize: none;
      outline: none;
      padding: 14px;
      font: 13px/1.55 "JetBrains Mono", "SFMono-Regular", Consolas, monospace;
      color: #111827;
      background: #fbfcfe;
      tab-size: 2;
    }

    .preview-wrap {
      position: relative;
      min-height: 0;
      overflow: auto;
      background:
        linear-gradient(#eef2f6 1px, transparent 1px),
        linear-gradient(90deg, #eef2f6 1px, transparent 1px);
      background-size: 24px 24px;
      padding: 0;
    }

    #preview {
      --bg: #F7F4EF;
      --bg2: #EFEBE3;
      --surface: #FDFCFA;
      --surface2: #F2EDE5;
      --border: rgba(60, 45, 25, 0.1);
      --border2: rgba(60, 45, 25, 0.18);
      --ink: #1C1710;
      --ink-2: #6B5F4E;
      --ink-3: #A8998A;
      --accent: #C4622D;
      --accent-2: #9A4A1F;
      --accent-lt: #F0D5C4;
      --accent-dk: #9A4A1F;
      --accent-hover: #9A4A1F;
      --accent-rgb: 196, 98, 45;
      --accent-gradient-end: #E88B5A;
      --green: #2D7D4F;
      --green-lt: #D1EAD9;
      --red: #C03A2B;
      --red-lt: #FAD7D3;
      --blue: #2B5FA0;
      --blue-lt: #D1DFF5;
      --yellow: #B07D12;
      --yellow-lt: #FAF0C0;
      --font-body: "Plus Jakarta Sans", Inter, system-ui, sans-serif;
      position: relative;
      width: 100%;
      height: 100%;
      min-width: 0;
      min-height: 0;
      background: #ffffff;
      border: 0;
      border-radius: 0;
      overflow: visible;
    }

    #preview .xa-showcase-stay-logo {
      font-weight: 800;
      font-size: 18px;
      letter-spacing: 0;
      color: #ff385c;
      white-space: nowrap;
    }

    #preview .xa-showcase-stay-logo span {
      color: var(--ink);
      font-weight: 700;
    }

    #preview .xa-al-panel-root {
      min-width: 0;
    }

    #preview [data-key$="~phone"].xa-al-panel-root {
      background: var(--surface);
      border-radius: 28px;
      box-shadow:
        0 0 0 1px rgba(var(--accent-rgb), 0.08),
        0 2px 4px rgba(28, 23, 16, 0.06),
        0 12px 32px rgba(28, 23, 16, 0.12),
        0 28px 72px rgba(28, 23, 16, 0.14);
      overflow: hidden;
    }

    #preview .xa-al-xlist-root {
      overflow: hidden;
    }

    #preview .xlist-content {
      scrollbar-width: none;
      -webkit-overflow-scrolling: touch;
    }

    #preview .xlist-content::-webkit-scrollbar {
      display: none;
    }

    #preview .xlist-item {
      box-sizing: border-box;
    }

    .status {
      min-height: 42px;
      padding: 9px 12px;
      border-top: 1px solid var(--line);
      color: var(--muted);
      font-size: 13px;
      white-space: pre-wrap;
      overflow: auto;
      background: var(--panel);
    }

    .status.error { color: var(--danger); }
    .status.ok { color: var(--ok); }

    @media (max-width: 900px) {
      .shell > main { grid-template-columns: 1fr; grid-template-rows: minmax(420px, 1fr) minmax(420px, 1fr); }
      .pane { border-right: 0; border-bottom: 1px solid var(--line); }
      .pane-splitter { display: none; }
      .shell > header { align-items: flex-start; flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header>
      <h1>XCON Playground</h1>
      <div class="header-actions">
        <button id="open-sketch">SKETCH Editor</button>
        <button id="open-markdown">Markdown</button>
        <button id="copy-npm">Copy npm</button>
        <button id="copy-embed">Copy embed</button>
        <button id="share">Share URL</button>
        <button id="export-html" class="primary">Export HTML</button>
      </div>
    </header>
    <main>
      <section class="pane">
        <div class="pane-head">
          <div class="tabs" role="tablist" aria-label="Syntax">
            <button class="tab" data-syntax="json" aria-pressed="true">JSON</button>
            <button class="tab" data-syntax="xml" aria-pressed="false">XML</button>
            <button class="tab" data-syntax="tagless" aria-pressed="false">TAGLESS</button>
            <button class="tab" data-syntax="sketch" aria-pressed="false">SKETCH</button>
          </div>
          <div class="toolbar">
            <button id="format">Format</button>
            <button id="validate">Validate</button>
            <button id="render" class="primary">Render</button>
          </div>
        </div>
        <textarea id="source" class="editor" spellcheck="false"></textarea>
        <div id="status" class="status">Ready.</div>
      </section>
      <div class="pane-splitter" id="paneSplitter" role="separator" aria-orientation="vertical" aria-label="Resize source and preview panes" aria-valuemin="280" aria-valuemax="1200" aria-valuenow="0" tabindex="0"></div>
      <section class="pane">
        <div class="pane-head">
          <div class="preview-title">
            <strong>Preview</strong>
            <span id="syntax-label" class="status-text">json</span>
          </div>
          <div class="theme-panel" aria-label="Preview theme controls">
            <span class="theme-panel__label">Theme</span>
            <div class="theme-switch" role="group" aria-label="Theme">
              <button type="button" class="theme-switch__btn" data-theme-option="light">Light</button>
              <button type="button" class="theme-switch__btn" data-theme-option="dark">Dark</button>
            </div>
            <span class="theme-panel__label">Accent</span>
            <div class="theme-accent-row">
              <input type="color" id="accentColorPicker" class="theme-accent-swatch" value="#C4622D" aria-label="Accent color">
              <input type="text" id="accentHexInput" class="theme-accent-hex" maxlength="7" spellcheck="false" placeholder="#RRGGBB" autocomplete="off">
              <button type="button" id="accentReset" class="theme-accent-reset">Reset</button>
            </div>
            <div class="theme-presets" role="group" aria-label="Accent presets">
              <button type="button" class="theme-preset-dot" data-hex="#C4622D" style="background:#C4622D" title="Terracotta" aria-label="Terracotta"></button>
              <button type="button" class="theme-preset-dot" data-hex="#7C6AF7" style="background:#7C6AF7" title="Violet" aria-label="Violet"></button>
              <button type="button" class="theme-preset-dot" data-hex="#2D7D4F" style="background:#2D7D4F" title="Forest" aria-label="Forest"></button>
              <button type="button" class="theme-preset-dot" data-hex="#2B5FA0" style="background:#2B5FA0" title="Ocean" aria-label="Ocean"></button>
              <button type="button" class="theme-preset-dot" data-hex="#C03A2B" style="background:#C03A2B" title="Crimson" aria-label="Crimson"></button>
              <button type="button" class="theme-preset-dot" data-hex="#B07D12" style="background:#B07D12" title="Amber" aria-label="Amber"></button>
              <button type="button" class="theme-preset-dot" data-hex="#0D9488" style="background:#0D9488" title="Teal" aria-label="Teal"></button>
              <button type="button" class="theme-preset-dot" data-hex="#DB2777" style="background:#DB2777" title="Pink" aria-label="Pink"></button>
            </div>
          </div>
        </div>
        <div class="preview-wrap">
          <div id="preview"></div>
        </div>
        <div id="validation" class="status">Validation output appears here.</div>
      </section>
    </main>
  </div>

  <script type="importmap">
    {
      "imports": {
        "@xcon-viewer/core": "../packages/core/dist/index.js",
        "@xcon-viewer/viewer": "../packages/viewer/dist/index.js"
      }
    }
  </script>

  <script type="module">
    import {
      convert,
      deserialize,
      fromJSON,
      fromJSONObject,
      normalize,
      prettyJson,
      printValidationResult,
      serializeBySyntax,
      validate
    } from '@xcon-viewer/core';
    import { render, renderDocument, viewerCss } from '@xcon-viewer/viewer';

    const previewRenderOptions = { allowExternalResources: true, allowHtml: true };
    const viewerStyle = document.createElement('style');
    viewerStyle.id = 'xcon-viewer-style';
    viewerStyle.textContent = viewerCss;
    document.head.appendChild(viewerStyle);

    const defaultDocument = {
      type: 'form',
      pos: [0, 0, 402, 520],
      backgroundColor: '#F8FAFC',
      components: {
        title: {
          type: 'label',
          pos: [24, 32, 354, 34],
          text: 'One screen. Four syntaxes.',
          font: { size: 22, weight: 800 },
          color: '#111827'
        },
        body: {
          type: 'textView',
          pos: [24, 88, 354, 86],
          text: 'Edit JSON, XML, TAGLESS, or SKETCH. The preview renders the same XCON Object Model.',
          color: '#475467',
          font: { size: 14, lineHeight: 1.5 }
        },
        cta: {
          type: 'button',
          pos: [24, 204, 180, 44],
          label: 'Preview',
          backgroundColor: '#2563EB',
          color: '#FFFFFF',
          border: { radius: 8 },
          font: { weight: 700 }
        }
      }
    };

    const source = document.getElementById('source');
    const status = document.getElementById('status');
    const validation = document.getElementById('validation');
    const preview = document.getElementById('preview');
    const syntaxLabel = document.getElementById('syntax-label');
    const accentColorPicker = document.getElementById('accentColorPicker');
    const accentHexInput = document.getElementById('accentHexInput');
    const accentReset = document.getElementById('accentReset');
    const paneSplitter = document.getElementById('paneSplitter');
    const themeStorageKey = 'xcon-playground-theme';
    const accentStorageKey = 'xcon-playground-accent';
    const themePalettes = {
      light: {
        '--bg': '#F7F4EF',
        '--bg2': '#EFEBE3',
        '--surface': '#FDFCFA',
        '--surface2': '#F2EDE5',
        '--border': 'rgba(60, 45, 25, 0.1)',
        '--border2': 'rgba(60, 45, 25, 0.18)',
        '--ink': '#1C1710',
        '--ink-2': '#6B5F4E',
        '--ink-3': '#A8998A',
        '--green': '#2D7D4F',
        '--green-lt': '#D1EAD9',
        '--red': '#C03A2B',
        '--red-lt': '#FAD7D3',
        '--blue': '#2B5FA0',
        '--blue-lt': '#D1DFF5',
        '--yellow': '#B07D12',
        '--yellow-lt': '#FAF0C0',
        '--font-body': '"Plus Jakarta Sans", Inter, system-ui, sans-serif'
      },
      dark: {
        '--bg': '#0C0C0F',
        '--bg2': '#121218',
        '--surface': '#16161A',
        '--surface2': '#1E1E24',
        '--border': 'rgba(255, 255, 255, 0.055)',
        '--border2': 'rgba(255, 255, 255, 0.1)',
        '--ink': '#F0EEF8',
        '--ink-2': '#8B88A0',
        '--ink-3': '#5A5770',
        '--green': '#34D399',
        '--green-lt': 'rgba(52, 211, 153, 0.12)',
        '--red': '#F87171',
        '--red-lt': 'rgba(248, 113, 113, 0.12)',
        '--blue': '#60A5FA',
        '--blue-lt': 'rgba(96, 165, 250, 0.12)',
        '--yellow': '#FBBF24',
        '--yellow-lt': 'rgba(251, 191, 36, 0.12)',
        '--font-body': 'Outfit, Inter, system-ui, sans-serif'
      }
    };
    let syntax = 'json';
    let lastDocument = fromJSONObject(defaultDocument);
    let renderTimer = 0;

    source.value = readSharedSource() ?? JSON.stringify(defaultDocument, null, 2);
    syntax = readSharedSyntax() ?? 'json';
    setActiveTab(syntax);
    initPaneSplitter();
    initThemeControls();

    document.querySelectorAll('.tab').forEach((tab) => {
      tab.addEventListener('click', () => switchSyntax(tab.dataset.syntax));
    });
    document.getElementById('format').addEventListener('click', formatSource);
    document.getElementById('validate').addEventListener('click', validateSource);
    document.getElementById('render').addEventListener('click', renderSource);
    document.getElementById('open-sketch').addEventListener('click', () => { location.href = '/play/sketch'; });
    document.getElementById('open-markdown').addEventListener('click', () => { location.href = '/play/markdown'; });
    document.getElementById('share').addEventListener('click', shareUrl);
    document.getElementById('export-html').addEventListener('click', exportHtml);
    document.getElementById('copy-embed').addEventListener('click', copyEmbed);
    document.getElementById('copy-npm').addEventListener('click', copyNpm);
    source.addEventListener('input', scheduleRender);
    loadInitialSource();

    async function loadInitialSource() {
      if (await loadSourceFromUrl()) return;
      scheduleRender();
    }

    async function loadSourceFromUrl() {
      const params = new URLSearchParams(location.search);
      const src = params.get('src');
      if (!src) return false;

      try {
        const url = resolveSourceUrl(src);
        const response = await fetch(url.href, {
          headers: { accept: 'text/plain, application/json, application/xml, */*' }
        });
        if (!response.ok) throw new Error(`Failed to load ${url.pathname}: ${response.status} ${response.statusText}`);

        const text = await response.text();
        source.value = text;
        setActiveTab(syntaxFromSourcePath(url.pathname, text));
        writeStatus(`Loaded ${url.pathname}.`, 'ok');
        scheduleRender();
      } catch (error) {
        writeStatus(error.message, 'error');
        scheduleRender();
      }
      return true;
    }

    function resolveSourceUrl(src) {
      const url = new URL(src, location.href);
      if (url.origin !== location.origin) throw new Error('Only same-origin XCON source files can be loaded.');
      url.hash = '';
      return url;
    }

    function syntaxFromSourcePath(pathname, text = '') {
      const path = decodeURIComponent(pathname).toLowerCase();
      if (path.endsWith('.xcon.json') || path.endsWith('.xconj') || path.endsWith('.json')) return 'json';
      if (path.endsWith('.xcon.xml') || path.endsWith('.xconx') || path.endsWith('.xml')) return 'xml';
      if (path.endsWith('.xcon.sketch') || path.endsWith('.xcons') || path.endsWith('.sketch')) return 'sketch';
      if (path.endsWith('.xcon') || path.endsWith('.xcont')) return 'tagless';
      return syntaxFromSourceText(text);
    }

    function syntaxFromSourceText(text) {
      const trimmed = String(text || '').trim();
      if (trimmed.startsWith('{') || trimmed.startsWith('[')) return 'json';
      if (trimmed.startsWith('<')) return 'xml';
      if (/^(screen|form|panel|label|button|image|banner|list)\b/i.test(trimmed)) return 'sketch';
      return 'tagless';
    }

    function initPaneSplitter() {
      const main = paneSplitter?.parentElement;
      if (!paneSplitter || !main) return;
      const minLeft = 280;
      const minRight = 320;

      paneSplitter.addEventListener('pointerdown', startPaneResize);
      paneSplitter.addEventListener('keydown', (event) => {
        if (event.key !== 'ArrowLeft' && event.key !== 'ArrowRight' && event.key !== 'Home' && event.key !== 'End') return;
        event.preventDefault();
        if (event.key === 'Home') {
          setPaneSize(minLeft);
          return;
        }
        if (event.key === 'End') {
          const rect = main.getBoundingClientRect();
          setPaneSize(rect.width - splitterWidth() - minRight);
          return;
        }
        nudgePaneSize(event.key === 'ArrowLeft' ? -24 : 24);
      });

      function startPaneResize(event) {
        if (window.matchMedia('(max-width: 900px)').matches) return;
        event.preventDefault();
        paneSplitter.setPointerCapture?.(event.pointerId);
        document.documentElement.classList.add('is-pane-resizing');
        window.addEventListener('pointermove', resizePane);
        window.addEventListener('pointerup', stopPaneResize, { once: true });
        resizePane(event);
      }

      function resizePane(event) {
        const rect = main.getBoundingClientRect();
        setPaneSize(event.clientX - rect.left);
      }

      function stopPaneResize(event) {
        window.removeEventListener('pointermove', resizePane);
        paneSplitter.releasePointerCapture?.(event.pointerId);
        document.documentElement.classList.remove('is-pane-resizing');
      }

      function nudgePaneSize(delta) {
        const current = readPaneSize();
        setPaneSize(current + delta);
      }

      function readPaneSize() {
        const value = parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--editor-pane-size'));
        if (Number.isFinite(value)) return value;
        return Math.round(main.getBoundingClientRect().width / 2);
      }

      function setPaneSize(value) {
        const rect = main.getBoundingClientRect();
        const maxLeft = Math.max(minLeft, rect.width - splitterWidth() - minRight);
        const next = Math.round(Math.max(minLeft, Math.min(maxLeft, value)));
        document.documentElement.style.setProperty('--editor-pane-size', `${next}px`);
        paneSplitter.setAttribute('aria-valuenow', String(next));
      }

      function splitterWidth() {
        return paneSplitter.getBoundingClientRect().width || 8;
      }
    }

    function initThemeControls() {
      applyTheme(readSavedTheme());
      document.querySelectorAll('[data-theme-option]').forEach((button) => {
        button.addEventListener('click', () => applyTheme(button.dataset.themeOption));
      });
      accentColorPicker.addEventListener('input', () => applyAccent(accentColorPicker.value));
      accentHexInput.addEventListener('change', () => applyAccent(accentHexInput.value));
      accentHexInput.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') applyAccent(accentHexInput.value);
      });
      accentReset.addEventListener('click', () => {
        try { localStorage.removeItem(accentStorageKey); } catch (error) {}
        applyAccent(defaultAccentForTheme(currentTheme()), { persist: false });
      });
      document.querySelectorAll('.theme-preset-dot').forEach((button) => {
        button.addEventListener('click', () => applyAccent(button.dataset.hex));
      });
    }

    function applyTheme(theme) {
      const nextTheme = theme === 'dark' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', nextTheme);
      applyPreviewPalette(themePalettes[nextTheme]);
      document.querySelectorAll('[data-theme-option]').forEach((button) => {
        const on = button.dataset.themeOption === nextTheme;
        button.setAttribute('aria-pressed', String(on));
      });
      try { localStorage.setItem('xcon-playground-theme', nextTheme); } catch (error) {}
      applyAccent(readSavedAccent() ?? defaultAccentForTheme(nextTheme), { persist: false });
    }

    function applyPreviewPalette(palette) {
      for (const [name, value] of Object.entries(palette)) {
        document.documentElement.style.setProperty(name, value);
        preview.style.setProperty(name, value);
      }
    }

    function applyAccent(value, options = {}) {
      const normalized = normalizeHex(value);
      if (!normalized) {
        syncAccentInputs(currentAccent());
        return;
      }
      const rgb = hexToRgb(normalized);
      const dark = currentTheme() === 'dark';
      document.documentElement.style.setProperty('--accent', normalized);
      preview.style.setProperty('--accent', normalized);
      setThemeVar('--accent-rgb', `${rgb.r}, ${rgb.g}, ${rgb.b}`);
      setThemeVar('--accent-hover', rgbToHex(mixRgb(rgb, { r: 0, g: 0, b: 0 }, dark ? 0.08 : 0.18)));
      setThemeVar('--accent-2', rgbToHex(mixRgb(rgb, dark ? { r: 255, g: 255, b: 255 } : { r: 0, g: 0, b: 0 }, dark ? 0.18 : 0.16)));
      setThemeVar('--accent-lt', dark ? `rgba(${rgb.r}, ${rgb.g}, ${rgb.b}, 0.22)` : rgbToHex(mixRgb(rgb, { r: 255, g: 255, b: 255 }, 0.72)));
      setThemeVar('--accent-dk', rgbToHex(mixRgb(rgb, { r: 0, g: 0, b: 0 }, dark ? 0.04 : 0.24)));
      setThemeVar('--accent-gradient-end', rgbToHex(mixRgb(rgb, { r: 255, g: 255, b: 255 }, dark ? 0.16 : 0.22)));
      syncAccentInputs(normalized);
      if (options.persist !== false) {
        try { localStorage.setItem('xcon-playground-accent', normalized); } catch (error) {}
      }
    }

    function setThemeVar(name, value) {
      document.documentElement.style.setProperty(name, value);
      preview.style.setProperty(name, value);
    }

    function syncAccentInputs(hex) {
      accentColorPicker.value = hex;
      accentHexInput.value = hex;
    }

    function readSavedTheme() {
      try {
        const value = localStorage.getItem(themeStorageKey);
        return value === 'dark' ? 'dark' : 'light';
      } catch (error) {
        return 'light';
      }
    }

    function readSavedAccent() {
      try {
        return normalizeHex(localStorage.getItem(accentStorageKey));
      } catch (error) {
        return null;
      }
    }

    function currentTheme() {
      return document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
    }

    function defaultAccentForTheme(theme) {
      return theme === 'dark' ? '#7C6AF7' : '#C4622D';
    }

    function currentAccent() {
      return normalizeHex(preview.style.getPropertyValue('--accent')) ?? defaultAccentForTheme(currentTheme());
    }

    function normalizeHex(value) {
      if (typeof value !== 'string') return null;
      const trimmed = value.trim();
      if (/^#[0-9a-fA-F]{6}$/.test(trimmed)) return trimmed.toUpperCase();
      if (/^[0-9a-fA-F]{6}$/.test(trimmed)) return `#${trimmed.toUpperCase()}`;
      if (/^#[0-9a-fA-F]{3}$/.test(trimmed)) {
        return `#${trimmed[1]}${trimmed[1]}${trimmed[2]}${trimmed[2]}${trimmed[3]}${trimmed[3]}`.toUpperCase();
      }
      return null;
    }

    function hexToRgb(hex) {
      const normalized = normalizeHex(hex) ?? '#C4622D';
      return {
        r: parseInt(normalized.slice(1, 3), 16),
        g: parseInt(normalized.slice(3, 5), 16),
        b: parseInt(normalized.slice(5, 7), 16)
      };
    }

    function rgbToHex(rgb) {
      const part = (value) => Math.max(0, Math.min(255, Math.round(value))).toString(16).padStart(2, '0');
      return `#${part(rgb.r)}${part(rgb.g)}${part(rgb.b)}`.toUpperCase();
    }

    function mixRgb(from, to, amount) {
      return {
        r: from.r + (to.r - from.r) * amount,
        g: from.g + (to.g - from.g) * amount,
        b: from.b + (to.b - from.b) * amount
      };
    }

    function parseSource() {
      if (syntax === 'json') return fromJSON(source.value);
      return deserialize(source.value);
    }

    function renderSource() {
      try {
        const doc = parseSource();
        const result = validate(doc, { trustedRendererPolicy: previewRenderOptions.allowHtml });
        lastDocument = doc;
        render(doc, preview, previewRenderOptions);
        writeValidation(result);
        writeStatus(result.valid ? 'Rendered.' : 'Rendered with validation errors.', result.valid ? 'ok' : 'error');
      } catch (error) {
        writeStatus(error.message, 'error');
      }
    }

    function validateSource() {
      try {
        const result = validate(parseSource(), { trustedRendererPolicy: previewRenderOptions.allowHtml });
        writeValidation(result);
        writeStatus(result.valid ? 'Valid XCON document.' : 'Validation failed.', result.valid ? 'ok' : 'error');
      } catch (error) {
        writeStatus(error.message, 'error');
      }
    }

    function formatSource() {
      try {
        const doc = parseSource();
        source.value = syntax === 'json' ? prettyJson(JSON.stringify(normalize(doc))) : serializeBySyntax(doc, syntax, true);
        lastDocument = doc;
        writeStatus('Formatted.', 'ok');
        scheduleRender();
      } catch (error) {
        writeStatus(error.message, 'error');
      }
    }

    function switchSyntax(nextSyntax) {
      if (!nextSyntax || nextSyntax === syntax) return;
      try {
        const next = convert(source.value, syntax, nextSyntax);
        syntax = nextSyntax;
        source.value = next;
        setActiveTab(syntax);
        writeStatus(`Converted to ${syntax}.`, 'ok');
        scheduleRender();
      } catch (error) {
        writeStatus(error.message, 'error');
      }
    }

    function setActiveTab(nextSyntax) {
      syntax = nextSyntax;
      syntaxLabel.textContent = nextSyntax;
      document.querySelectorAll('.tab').forEach((tab) => {
        tab.setAttribute('aria-pressed', String(tab.dataset.syntax === nextSyntax));
      });
    }

    function scheduleRender() {
      clearTimeout(renderTimer);
      renderTimer = setTimeout(renderSource, 250);
    }

    function writeValidation(result) {
      validation.className = `status ${result.valid ? 'ok' : 'error'}`;
      validation.textContent = printValidationResult(result);
    }

    function writeStatus(message, tone = '') {
      status.className = `status ${tone}`;
      status.textContent = message;
    }

    async function shareUrl() {
      const params = new URLSearchParams({ syntax, source: source.value });
      const url = `${location.origin}${location.pathname}#${params.toString()}`;
      await navigator.clipboard.writeText(url);
      history.replaceState(null, '', `#${params.toString()}`);
      writeStatus('Share URL copied.', 'ok');
    }

    function exportHtml() {
      const html = renderDocument(lastDocument, previewRenderOptions);
      const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
      const href = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = href;
      link.download = 'xcon-render.html';
      link.click();
      URL.revokeObjectURL(href);
      writeStatus('HTML exported.', 'ok');
    }

    async function copyEmbed() {
      const escaped = source.value.replaceAll('&', '&amp;').replaceAll('"', '&quot;').replaceAll('<', '&lt;');
      await navigator.clipboard.writeText(`<xcon-viewer content="${escaped}"></xcon-viewer>`);
      writeStatus('Embed code copied.', 'ok');
    }

    async function copyNpm() {
      await navigator.clipboard.writeText('npm install @xcon-viewer/core @xcon-viewer/viewer');
      writeStatus('npm install command copied.', 'ok');
    }

    function readSharedSyntax() {
      const params = new URLSearchParams(location.hash.slice(1));
      const value = params.get('syntax');
      return ['json', 'xml', 'tagless', 'sketch'].includes(value) ? value : null;
    }

    function readSharedSource() {
      const params = new URLSearchParams(location.hash.slice(1));
      return params.get('source');
    }
  </script>
</body>
</html>
