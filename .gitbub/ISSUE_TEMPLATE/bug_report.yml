name: Bug report
description: Report a reproducible problem in XCON Viewer.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please provide a minimal reproducible example.
        Do not use this form for security vulnerabilities. Use the security policy instead.

  - type: checkboxes
    id: existing
    attributes:
      label: Existing issue check
      options:
        - label: I have searched existing issues and discussions.
          required: true

  - type: dropdown
    id: area
    attributes:
      label: Affected area
      multiple: true
      options:
        - Core parser / object model
        - Viewer renderer / Web Component
        - CLI
        - React wrapper
        - Vue wrapper
        - Markdown integration
        - Vite plugin
        - GitHub Action
        - Public site / docs
        - Examples
        - Other
    validations:
      required: true

  - type: textarea
    id: current
    attributes:
      label: Current behavior
      description: What happened?
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Provide exact steps.
      placeholder: |
        1. Open ...
        2. Paste this XCON / Markdown ...
        3. Run ...
        4. See ...
    validations:
      required: true

  - type: textarea
    id: minimal-input
    attributes:
      label: Minimal XCON / Markdown input
      description: Paste the smallest input that reproduces the issue.
      render: text
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment
      value: |
        - OS:
        - Browser:
        - Node:
        - npm:
        - Package/version:
        - Commit SHA:
      render: markdown
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste logs or attach screenshots if relevant.
      render: shell
    validations:
      required: false

  - type: checkboxes
    id: terms
    attributes:
      label: Project rules
      options:
        - label: I agree to follow the Code of Conduct.
          required: true
        - label: This is not a public security vulnerability report.
          required: true
