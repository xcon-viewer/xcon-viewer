<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Advanced Visualization Test</title>
    <style>
      :root {
        color-scheme: light;
        --page: #f6f7f9;
        --panel: #ffffff;
        --panel-2: #eef1f5;
        --ink: #17202a;
        --muted: #596579;
        --line: #d7dde6;
        --accent: #0f766e;
        --accent-2: #1d4ed8;
        --danger: #b91c1c;
        --ok: #047857;
        --shadow: 0 16px 40px rgba(23, 32, 42, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--page);
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .shell {
        width: min(1480px, calc(100% - 32px));
        margin: 0 auto;
        padding: 24px 0;
      }

      .topbar {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 16px;
      }

      h1 {
        margin: 0 0 6px;
        font-size: 28px;
        line-height: 1.15;
        letter-spacing: 0;
      }

      .subtitle {
        margin: 0;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.5;
      }

      .controls {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      label {
        display: grid;
        gap: 6px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
        text-transform: uppercase;
      }

      select,
      button,
      textarea {
        font: inherit;
      }

      select {
        min-width: 240px;
        height: 38px;
        border: 1px solid var(--line);
        border-radius: 6px;
        background: var(--panel);
        color: var(--ink);
        padding: 0 36px 0 12px;
      }

      button {
        height: 38px;
        border: 0;
        border-radius: 6px;
        background: var(--accent);
        color: #ffffff;
        padding: 0 14px;
        font-weight: 700;
        cursor: pointer;
      }

      button:hover {
        filter: brightness(1.04);
      }

      .workspace {
        display: grid;
        grid-template-columns: minmax(360px, 0.82fr) minmax(560px, 1.18fr);
        gap: 14px;
        min-height: calc(100vh - 132px);
      }

      .pane {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        min-height: 0;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .pane-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        min-height: 48px;
        padding: 12px 14px;
        border-bottom: 1px solid var(--line);
        background: var(--panel-2);
      }

      .pane-title {
        font-size: 13px;
        font-weight: 800;
      }

      #status {
        min-width: 0;
        min-height: 20px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.4;
        overflow-wrap: anywhere;
        text-align: right;
      }

      #status[data-state="ok"] {
        color: var(--ok);
      }

      #status[data-state="error"] {
        color: var(--danger);
      }

      #source {
        width: 100%;
        height: 100%;
        min-height: 540px;
        resize: none;
        border: 0;
        outline: none;
        padding: 16px;
        background: #101820;
        color: #f8fafc;
        font-family: "JetBrains Mono", "SFMono-Regular", Consolas, monospace;
        font-size: 13px;
        line-height: 1.55;
        tab-size: 2;
      }

      .preview-scroll {
        min-height: 0;
        overflow: auto;
        padding: 18px;
        background: #eef2f7;
      }

      #preview {
        width: 100%;
        min-height: 100%;
      }

      @media (max-width: 980px) {
        .topbar {
          align-items: stretch;
          flex-direction: column;
        }

        .controls {
          align-items: flex-end;
        }

        .workspace {
          grid-template-columns: 1fr;
          min-height: 0;
        }

        #source {
          min-height: 380px;
        }
      }
    </style>
    <style id="viewerStyles"></style>
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <h1>Advanced Visualization Test</h1>
          <p class="subtitle">Run browser-bundled XCON/SKETCH samples for network diagrams, data visualization, and map layers.</p>
        </div>
        <div class="controls">
          <label for="sampleSelect">
            Sample
            <select id="sampleSelect"></select>
          </label>
          <button id="renderButton" type="button">Render</button>
        </div>
      </header>

      <section class="workspace" aria-label="Visualization test workspace">
        <div class="pane">
          <div class="pane-header">
            <div class="pane-title">Source</div>
          </div>
          <textarea id="source" spellcheck="false"></textarea>
        </div>
        <div class="pane">
          <div class="pane-header">
            <div class="pane-title">Preview</div>
            <div id="status" role="status" aria-live="polite"></div>
          </div>
          <div class="preview-scroll">
            <div id="preview"></div>
          </div>
        </div>
      </section>
    </main>

    <!-- Regenerate runtime with: npx esbuild site/advanced-visualization-test-entry.mjs --bundle --format=esm --platform=browser --outfile=site/advanced-visualization-test-runtime.js -->
    <script type="module">
      import { parseBySyntax, render, viewerCss } from '/site/advanced-visualization-test-runtime.js';

      const samples = [
        { id: 'network-runtime', name: 'Network Diagram Runtime', sketch: `screen "Network Diagram Runtime" 980x620 bg #eef4fb
  title: label "Network Runtime" at 24 28 420 38
    color #17202a
    font
      size 26
      weight 800
  network: networkDiagram at 24 96 932 492
    theme "obsidian"
    showControls true
    showSearch true
    showFilters true
    showLegend true
    showLabels true
    showArrows true
    nodes [{"id":"viewer","label":"Viewer runtime","group":"runtime"},{"id":"core","label":"Core parser","group":"parser"},{"id":"site","label":"Static site","group":"delivery"},{"id":"samples","label":"Sample pages","group":"delivery"}]
    links [{"source":"viewer","target":"core","type":"contract"},{"source":"viewer","target":"site","type":"bundle"},{"source":"site","target":"samples","type":"route"}]` },
        { id: 'dataviz-treemap', name: 'DataViz Treemap', sketch: `screen "Treemap" 760x460
  title: label "Workspace Allocation" at 24 30 520 32
    color #17202a
    font
      size 24
      weight 800
  usageTree: dataViz at 24 80 700 320
    vizType "treemap"
    data {"name":"Workspace","children":[{"name":"Viewer","value":42},{"name":"Core","value":28},{"name":"Site","value":16}]}` },
        { id: 'dataviz-sankey', name: 'DataViz Sankey', sketch: `screen "Sankey" 760x460
  title: label "Document Flow" at 24 30 520 32
    color #17202a
    font
      size 24
      weight 800
  flow: dataViz at 24 80 700 320
    vizType "sankey"
    data {"nodes":[{"id":"input","label":"Input"},{"id":"process","label":"Process"},{"id":"output","label":"Output"}],"links":[{"source":"input","target":"process","value":18},{"source":"process","target":"output","value":12}]}` },
        { id: 'dataviz-sunburst', name: 'DataViz Sunburst', sketch: `screen "Sunburst" 760x460
  title: label "Radial Breakdown" at 24 30 520 32
    color #17202a
    font
      size 24
      weight 800
  radial: dataViz at 24 80 700 320
    vizType "sunburst"
    data {"name":"Workspace","children":[{"name":"Runtime","value":34},{"name":"Docs","value":18},{"name":"Tests","value":22}]}` },
        { id: 'dataviz-chord', name: 'DataViz Chord', sketch: `screen "Chord" 760x460
  title: label "Module Relationships" at 24 30 520 32
    color #17202a
    font
      size 24
      weight 800
  matrix: dataViz at 24 80 700 320
    vizType "chord"
    data {"labels":["Viewer","Core","Site"],"matrix":[[0,12,8],[9,0,6],[5,4,0]]}` },
        { id: 'dataviz-forcegraph', name: 'DataViz ForceGraph', sketch: `screen "ForceGraph" 760x460
  title: label "Runtime Relations" at 24 30 520 32
    color #17202a
    font
      size 24
      weight 800
  relations: dataViz at 24 80 700 320
    vizType "forceGraph"
    data {"nodes":[{"id":"viewer","label":"Viewer"},{"id":"core","label":"Core"},{"id":"site","label":"Site"}],"links":[{"source":"viewer","target":"core"},{"source":"viewer","target":"site"}]}` },
        { id: 'dataviz-plot', name: 'Observable Plot', sketch: `screen "Observable Plot" 760x460
  title: label "Weekly Volume" at 24 30 520 32
    color #17202a
    font
      size 24
      weight 800
  plotView: dataViz at 24 80 700 320
    vizType "plot"
    data {"data":[{"day":"Mon","value":12},{"day":"Tue","value":18},{"day":"Wed","value":15}],"marks":[{"type":"barY","x":"day","y":"value"}],"options":{"grid":true}}` },
        { id: 'map-layers', name: 'Map Layers', sketch: `screen "Map Layers" 760x520
  title: label "Layered Leaflet Map" at 24 30 520 32
    color #17202a
    font
      size 24
      weight 800
  geo: map at 24 80 700 360
    provider "leaflet"
    latitude 37.5665
    longitude 126.978
    zoom 11
    markers [{"lat":37.5665,"lng":126.978,"label":"City Hall"},{"lat":37.5704,"lng":126.983,"label":"Studio"}]
    polylines [{"points":[[37.5665,126.978],[37.5704,126.983]],"color":"#2563eb"}]
    polygons [{"points":[[37.56,126.97],[37.58,126.97],[37.58,127.0]],"color":"#14b8a6"}]
    heatmap [[37.5665,126.978,0.8],[37.5704,126.983,0.5]]
    clustering true` },
      ];

      const sampleSelect = document.getElementById('sampleSelect');
      const source = document.getElementById('source');
      const preview = document.getElementById('preview');
      const status = document.getElementById('status');
      const renderButton = document.getElementById('renderButton');
      document.getElementById('viewerStyles').textContent = viewerCss;

      for (const sample of samples) {
        const option = document.createElement('option');
        option.value = sample.id;
        option.textContent = sample.name;
        sampleSelect.append(option);
      }

      function setStatus(message, state = '') {
        status.textContent = message;
        status.dataset.state = state;
      }

      function activeSample() {
        return samples.find((sample) => sample.id === sampleSelect.value) ?? samples[0];
      }

      function loadSample(sample) {
        source.value = sample.sketch;
        renderSource();
      }

      function renderSource() {
        try {
          const documentModel = parseBySyntax(source.value, 'sketch');
          render(documentModel, preview, { allowExternalResources: true });
          setStatus('Rendered', 'ok');
        } catch (error) {
          preview.replaceChildren();
          setStatus(error instanceof Error ? error.message : String(error), 'error');
        }
      }

      sampleSelect.addEventListener('change', () => loadSample(activeSample()));
      renderButton.addEventListener('click', renderSource);
      source.addEventListener('keydown', (event) => {
        if ((event.metaKey || event.ctrlKey) && event.key === 'Enter') {
          event.preventDefault();
          renderSource();
        }
      });

      sampleSelect.value = samples[0].id;
      loadSample(samples[0]);
    </script>
  </body>
</html>
