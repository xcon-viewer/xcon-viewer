<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>XCON Markdown Viewer</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f7f9;
      --surface: #ffffff;
      --surface-2: #eef2f7;
      --ink: #172033;
      --muted: #667085;
      --line: #d9e0ea;
      --accent: #c4622d;
      --accent-rgb: 196, 98, 45;
      --danger: #b42318;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-size: 16px;
      line-height: 1.65;
    }

    a {
      color: #2563eb;
      text-decoration-thickness: 1px;
      text-underline-offset: 3px;
    }

    code,
    pre {
      font-family: "JetBrains Mono", "SFMono-Regular", Consolas, monospace;
    }

    .viewer-shell {
      min-height: 100vh;
    }

    .viewer-topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      min-height: 58px;
      padding: 10px 18px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.94);
      backdrop-filter: blur(10px);
    }

    .viewer-title {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
    }

    .viewer-title span:last-child {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 22px;
      border-radius: 999px;
      padding: 3px 8px;
      background: rgba(var(--accent-rgb), 0.1);
      color: var(--accent);
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      flex: 0 0 auto;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 32px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: var(--surface);
      color: var(--ink);
      padding: 6px 10px;
      font: inherit;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
    }

    .button:hover {
      border-color: #b8c2d1;
    }

    .markdown-document {
      width: min(960px, calc(100% - 36px));
      min-height: calc(100vh - 58px);
      margin: 0 auto;
      padding: 34px 0 78px;
    }

    .markdown-document > :first-child {
      margin-top: 0;
    }

    .markdown-document h1,
    .markdown-document h2,
    .markdown-document h3,
    .markdown-document h4 {
      margin: 1.55em 0 0.65em;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .markdown-document h1 {
      padding-bottom: 0.45em;
      border-bottom: 1px solid var(--line);
      font-size: 34px;
    }

    .markdown-document h2 {
      padding-bottom: 0.35em;
      border-bottom: 1px solid var(--line);
      font-size: 26px;
    }

    .markdown-document h3 { font-size: 21px; }
    .markdown-document h4 { font-size: 17px; }

    .markdown-document p,
    .markdown-document ul,
    .markdown-document ol,
    .markdown-document blockquote,
    .markdown-document table,
    .markdown-document pre {
      margin: 0 0 18px;
    }

    .markdown-document ul,
    .markdown-document ol {
      padding-left: 24px;
    }

    .markdown-document li + li {
      margin-top: 6px;
    }

    .markdown-document blockquote {
      padding: 10px 16px;
      border-left: 4px solid var(--accent);
      background: rgba(var(--accent-rgb), 0.06);
      color: var(--muted);
    }

    .markdown-document table {
      width: 100%;
      border-collapse: collapse;
      display: block;
      overflow-x: auto;
      border: 1px solid var(--line);
      border-radius: 8px;
    }

    .markdown-document th,
    .markdown-document td {
      min-width: 160px;
      padding: 10px 12px;
      border: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }

    .markdown-document th {
      background: var(--surface-2);
      font-weight: 800;
    }

    .markdown-document code {
      padding: 2px 5px;
      border: 1px solid rgba(196, 98, 45, 0.18);
      border-radius: 5px;
      background: rgba(196, 98, 45, 0.08);
      color: #9a3412;
      font-size: 0.88em;
    }

    .markdown-document pre {
      overflow: auto;
      padding: 16px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #101827;
      color: #f8fafc;
      font-size: 13px;
      line-height: 1.55;
    }

    .markdown-document pre code {
      padding: 0;
      border: 0;
      border-radius: 0;
      background: transparent;
      color: inherit;
      font-size: inherit;
    }

    .markdown-xcon-block {
      margin: 22px 0;
      max-width: 100%;
      overflow: visible;
    }

    .markdown-xcon-frame {
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #ffffff;
      box-shadow: 0 14px 36px rgba(23, 32, 51, 0.1);
    }

    .xcon-markdown-error {
      border-color: rgba(180, 35, 24, 0.3);
      background: #fff4f2;
      color: var(--danger);
      white-space: pre-wrap;
    }

    .loading,
    .error {
      margin: 36px 0;
      padding: 18px 20px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      color: var(--muted);
    }

    .error {
      border-color: rgba(180, 35, 24, 0.3);
      color: var(--danger);
    }

    @media (max-width: 720px) {
      .viewer-topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .actions {
        justify-content: flex-start;
      }

      .markdown-document {
        width: min(100% - 24px, 960px);
        padding-top: 24px;
      }

      .markdown-document h1 { font-size: 28px; }
      .markdown-document h2 { font-size: 23px; }
    }
  </style>
</head>
<body>
  <div class="viewer-shell">
    <header class="viewer-topbar">
      <div class="viewer-title">
        <span class="badge">Markdown</span>
        <span id="documentTitle">Loading...</span>
      </div>
      <nav class="actions" aria-label="Document actions">
        <a class="button" href="/docs">Docs</a>
        <a class="button" id="rawLink" href="#">Raw</a>
      </nav>
    </header>

    <main id="markdownDocument" class="markdown-document">
      <div class="loading">Loading Markdown...</div>
    </main>
  </div>

  <script type="importmap">
    {
      "imports": {
        "@xcon-viewer/core": "/packages/core/dist/index.js",
        "@xcon-viewer/markdown-it": "/packages/markdown-it/dist/index.js",
        "@xcon-viewer/viewer": "/packages/viewer/dist/index.js"
      }
    }
  </script>
  <script src="/vendor/markdown-it/markdown-it.min.js"></script>

  <script type="module">
    import xconMarkdownIt from '@xcon-viewer/markdown-it';
    import { hydrateXconViewer, viewerCss } from '@xcon-viewer/viewer';

    const markdownDocument = document.getElementById('markdownDocument');
    const documentTitle = document.getElementById('documentTitle');
    const rawLink = document.getElementById('rawLink');
    const sourcePath = new URLSearchParams(location.search).get('src') || location.pathname;
    const rawUrl = new URL(sourcePath, location.origin);
    rawUrl.searchParams.set('raw', '1');
    rawLink.href = rawUrl.toString();

    const viewerStyle = document.createElement('style');
    viewerStyle.id = 'xcon-viewer-style';
    viewerStyle.textContent = viewerCss;
    document.head.appendChild(viewerStyle);

    const MarkdownIt = globalThis.markdownit;
    if (typeof MarkdownIt !== 'function') {
      showError('markdown-it browser bundle failed to load.');
      throw new Error('markdown-it browser bundle failed to load.');
    }

    const markdown = MarkdownIt({
      html: false,
      linkify: true,
      typographer: false,
    });
    markdown.use(xconMarkdownIt, {
      renderOptions: { allowExternalResources: true, allowHtml: true },
      containerClass: 'markdown-xcon-block',
      frameClass: 'markdown-xcon-frame',
    });

    loadMarkdown();

    async function loadMarkdown() {
      try {
        const response = await fetch(rawUrl.toString(), {
          headers: { accept: 'text/markdown,text/plain,*/*' },
        });
        if (!response.ok) throw new Error(`Failed to load Markdown (${response.status})`);

        const source = await response.text();
        const title = titleFromSource(source) || sourcePath.split('/').pop() || 'Markdown';
        document.title = `${title} - XCON Markdown Viewer`;
        documentTitle.textContent = title;
        markdownDocument.innerHTML = markdown.render(source);
        hydrateXconViewer(markdownDocument);
      } catch (error) {
        showError(error instanceof Error ? error.message : String(error));
      }
    }

    function titleFromSource(source) {
      const match = source.match(/^#\s+(.+)$/m);
      return match ? match[1].trim() : '';
    }

    function showError(message) {
      documentTitle.textContent = 'Markdown load failed';
      markdownDocument.innerHTML = `<div class="error">${escapeHtml(message)}</div>`;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }
  </script>
</body>
</html>
